<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Python Defense — Class Analyser</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<style>
  :root {
    --bg: #1e1e1e;
    --bg2: #252526;
    --bg3: #2d2d2d;
    --border: #444;
    --accent-green: #6a9955;
    --accent-blue: #569cd6;
    --accent-yellow: #dcdcaa;
    --accent-red: #f44747;
    --text: #d4d4d4;
    --text-dim: #888;
    --correct: #1a3a1a;
    --correct-border: #4a9955;
    --wrong: #3a1a1a;
    --wrong-border: #f44747;
    --correct-text: #6a9955;
    --wrong-text: #f44747;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Consolas', 'Courier New', monospace;
    min-height: 100vh;
    padding: 30px;
  }

  header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 30px;
    border-bottom: 2px solid var(--accent-blue);
    padding-bottom: 20px;
  }

  header h1 {
    font-size: 1.6rem;
    color: var(--accent-blue);
    letter-spacing: 2px;
  }

  header span {
    color: var(--text-dim);
    font-size: 0.85rem;
  }

  #drop-zone {
    border: 2px dashed var(--border);
    border-radius: 4px;
    padding: 50px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    margin-bottom: 24px;
    background: var(--bg2);
  }

  #drop-zone.dragover {
    border-color: var(--accent-blue);
    background: #1a2a3a;
  }

  #drop-zone p { color: var(--text-dim); font-size: 0.9rem; margin-top: 8px; }
  #drop-zone .icon { font-size: 2.5rem; margin-bottom: 8px; }

  #file-input { display: none; }

  .btn {
    background: var(--accent-blue);
    color: #1e1e1e;
    border: none;
    padding: 8px 18px;
    font-family: 'Consolas', monospace;
    font-size: 0.85rem;
    font-weight: bold;
    cursor: pointer;
    letter-spacing: 1px;
    border-radius: 2px;
    transition: opacity 0.15s;
  }
  .btn:hover { opacity: 0.85; }
  .btn-red { background: var(--accent-red); color: #fff; }

  #controls {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    align-items: center;
    flex-wrap: wrap;
  }

  #file-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 20px;
  }

  .file-tag {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 4px 10px;
    font-size: 0.8rem;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .file-tag.loaded { border-color: var(--accent-green); color: var(--accent-green); }
  .file-tag.error { border-color: var(--accent-red); color: var(--accent-red); }
  .file-tag button { background: none; border: none; color: inherit; cursor: pointer; font-size: 0.9rem; padding: 0; }

  #status {
    color: var(--text-dim);
    font-size: 0.85rem;
    margin-bottom: 16px;
    min-height: 20px;
  }

  #exam-tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 0;
    border-bottom: 2px solid var(--border);
  }

  .exam-tab {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-bottom: none;
    color: var(--text-dim);
    padding: 8px 20px;
    font-family: 'Consolas', monospace;
    font-size: 0.85rem;
    cursor: pointer;
    border-radius: 2px 2px 0 0;
    transition: background 0.15s, color 0.15s;
  }
  .exam-tab.active {
    background: var(--bg3);
    color: var(--accent-yellow);
    border-color: var(--accent-blue);
    border-bottom-color: var(--bg3);
  }

  #results-area {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-top: none;
    padding: 20px;
    overflow-x: auto;
  }

  #results-area.hidden { display: none; }

  table {
    border-collapse: collapse;
    width: 100%;
    font-size: 0.8rem;
  }

  th {
    background: var(--bg3);
    color: var(--accent-blue);
    padding: 10px 12px;
    text-align: left;
    border: 1px solid var(--border);
    white-space: nowrap;
    position: sticky;
    top: 0;
    z-index: 2;
  }

  th.student-name {
    color: var(--accent-yellow);
    min-width: 100px;
    max-width: 140px;
  }

  td {
    border: 1px solid var(--border);
    padding: 8px 12px;
    vertical-align: middle;
  }

  td.question-label {
    color: var(--text-dim);
    background: var(--bg3);
    white-space: nowrap;
    max-width: 260px;
    overflow: hidden;
    text-overflow: ellipsis;
    position: sticky;
    left: 0;
    z-index: 1;
  }

  td.correct {
    background: var(--correct);
    border-color: var(--correct-border);
    color: var(--correct-text);
    text-align: center;
    font-weight: bold;
  }

  td.wrong {
    background: var(--wrong);
    border-color: var(--wrong-border);
    color: var(--wrong-text);
    text-align: center;
    font-weight: bold;
  }

  td.no-data {
    background: var(--bg);
    color: var(--border);
    text-align: center;
  }

  tr.score-row td {
    background: var(--bg3);
    color: var(--accent-yellow);
    font-weight: bold;
    border-top: 2px solid var(--accent-blue);
  }

  tr.score-row td.question-label {
    color: var(--accent-yellow);
  }

  #summary {
    margin-top: 20px;
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
  }

  .summary-card {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 14px 20px;
    min-width: 160px;
  }

  .summary-card .label { color: var(--text-dim); font-size: 0.75rem; margin-bottom: 4px; }
  .summary-card .value { font-size: 1.3rem; color: var(--accent-yellow); }

  .hardest-q {
    margin-top: 20px;
    background: var(--bg3);
    border: 1px solid var(--wrong-border);
    border-radius: 2px;
    padding: 14px 20px;
  }
  .hardest-q h3 { color: var(--accent-red); font-size: 0.85rem; margin-bottom: 10px; letter-spacing: 1px; }
  .hardest-q-item { color: var(--text-dim); font-size: 0.8rem; margin-bottom: 6px; display: flex; gap: 10px; }
  .hardest-q-item .pct { color: var(--accent-red); min-width: 40px; }
  .hardest-q-item .qtext { color: var(--text); }

  #empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
  }
  #empty-state .big { font-size: 3rem; margin-bottom: 12px; }
</style>
</head>
<body>

<header>
  <div>
    <h1>PYTHON DEFENSE — CLASS ANALYSER</h1>
    <span>Drop student PDF reports to generate class feedback</span>
  </div>
</header>

<div id="drop-zone" onclick="document.getElementById('file-input').click()">
  <div class="icon">📂</div>
  <div style="color: var(--text); font-size: 1rem;">Drop PDF reports here or click to browse</div>
  <p>Accepts multiple PythonDefense_StudentName_Report.pdf files</p>
</div>
<input type="file" id="file-input" accept=".pdf" multiple>

<div id="controls" style="display:none;">
    <button class="btn" onclick="analyseAll()">ANALYSE</button>
    <button class="btn" id="export-btn" onclick="exportToPDF()" style="display:none; background:#6a9955;">DOWNLOAD PDF</button>
    <button class="btn btn-red" onclick="clearAll()">CLEAR</button>
</div>

<div id="file-list"></div>
<div id="status"></div>

<div id="exam-tabs"></div>
<div id="results-area" class="hidden">
  <div id="empty-state">
    <div class="big">📊</div>
    <div>Load PDFs and click ANALYSE to see results</div>
  </div>
</div>

<script>
  const PDFJS_URL = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';

  let pdfJsLoaded = false;
  let loadedFiles = [];
  let currentExamId = null;

  // Load PDF.js
  const script = document.createElement('script');
  script.src = PDFJS_URL;
  script.onload = () => {
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    pdfJsLoaded = true;
  };
  document.head.appendChild(script);

  // --- Drag and drop ---
  const dropZone = document.getElementById('drop-zone');
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    handleFiles([...e.dataTransfer.files]);
  });
  document.getElementById('file-input').addEventListener('change', e => handleFiles([...e.target.files]));

  function handleFiles(files) {
    const pdfs = files.filter(f => f.name.endsWith('.pdf'));
    if (!pdfs.length) { setStatus('No PDF files found.'); return; }
    pdfs.forEach(addFile);
    document.getElementById('controls').style.display = 'flex';
  }

  function addFile(file) {
    if (loadedFiles.find(f => f.name === file.name)) return;
    // Use filename as temporary placeholder — overridden by PDF Author metadata on analyse
    const studentName = extractStudentNameFromFilename(file.name);
    const entry = { name: file.name, studentName, file, examData: null, status: 'pending' };
    loadedFiles.push(entry);
    renderFileTags();
  }

  function extractStudentNameFromFilename(filename) {
    // Strip any trailing (1), (2) etc added by browser downloads
    const cleaned = filename.replace(/\s*\(\d+\)(?=\.pdf$)/i, '');
    const match = cleaned.match(/PythonDefense_(.+)_Report\.pdf$/i);
    if (match) return match[1].replace(/_/g, ' ');
    return cleaned.replace('.pdf', '');
}

  function renderFileTags() {
    const list = document.getElementById('file-list');
    list.innerHTML = '';
    loadedFiles.forEach((f, i) => {
      const tag = document.createElement('div');
      tag.className = `file-tag ${f.status === 'loaded' ? 'loaded' : f.status === 'error' ? 'error' : ''}`;
      tag.innerHTML = `<span>${f.studentName}</span><button onclick="removeFile(${i})">✕</button>`;
      list.appendChild(tag);
    });
  }

  function removeFile(i) {
    loadedFiles.splice(i, 1);
    renderFileTags();
    if (!loadedFiles.length) {
      document.getElementById('controls').style.display = 'none';
      document.getElementById('results-area').classList.add('hidden');
      document.getElementById('exam-tabs').innerHTML = '';
    }
  }

  function clearAll() {
    loadedFiles = [];
    renderFileTags();
    document.getElementById('controls').style.display = 'none';
    document.getElementById('results-area').classList.add('hidden');
    document.getElementById('exam-tabs').innerHTML = '';
    setStatus('');
  }

  function setStatus(msg) {
    document.getElementById('status').textContent = msg;
  }

  // --- Parse PDF metadata ---
  async function parsePDF(file) {
    if (!pdfJsLoaded) throw new Error('PDF.js not loaded yet');
    const arrayBuffer = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
    const meta = await pdf.getMetadata();
    const subject = meta?.info?.Subject || '';
    // Author field stores the original unmodified student name from the game
    const author = meta?.info?.Author || '';
    return { examData: parseCSV(subject), studentName: author || null };
  }

  function parseCSV(csvString) {
    if (!csvString) return null;
    const lines = csvString.split('\n').filter(l => l.trim());
    const examData = {};
    let currentExam = null;

    for (const line of lines) {
      const cols = parseCSVLine(line);
      if (!cols.length) continue;

      const first = cols[0].trim();

      // Exam summary row: "Exam 1,,, 8/10,..."
      const examMatch = first.match(/^Exam\s+(\d+)$/);
      if (examMatch && cols[1]?.trim() === '' && cols[2]?.trim() === '') {
        const id = parseInt(examMatch[1]);
        const scoreStr = cols[3]?.trim() || '';
        const scoreMatch = scoreStr.match(/(\d+)\/(\d+)/);
        currentExam = id;
        if (!examData[id]) examData[id] = { score: null, total: null, questions: [] };
        if (scoreMatch) {
          examData[id].score = parseInt(scoreMatch[1]);
          examData[id].total = parseInt(scoreMatch[2]);
        }
        continue;
      }

      // Question row: "Exam 1 Q3","prompt",CORRECT/WRONG,"answer"
      const qMatch = first.match(/^Exam\s+(\d+)\s+Q(\d+)$/);
      if (qMatch) {
        const id = parseInt(qMatch[1]);
        const qNum = parseInt(qMatch[2]);
        if (!examData[id]) examData[id] = { score: null, total: null, questions: [] };
        examData[id].questions.push({
          q: qNum,
          prompt: cols[1]?.trim() || `Q${qNum}`,
          correct: cols[2]?.trim() === 'CORRECT',
          user: cols[3]?.trim() || ''
        });
      }
    }

    return examData;
  }

  function parseCSVLine(line) {
    const result = [];
    let current = '';
    let inQuotes = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"' && !inQuotes) { inQuotes = true; }
      else if (ch === '"' && inQuotes) { inQuotes = false; }
      else if (ch === ',' && !inQuotes) { result.push(current); current = ''; }
      else { current += ch; }
    }
    result.push(current);
    return result;
  }

  // --- Analyse ---
  async function analyseAll() {
    setStatus('Reading PDFs...');
    let loaded = 0;

    for (const entry of loadedFiles) {
      try {
        const result = await parsePDF(entry.file);
        entry.examData = result.examData;
        // Override the filename-derived name with the real name from PDF Author metadata
        if (result.studentName) entry.studentName = result.studentName;
        entry.status = entry.examData ? 'loaded' : 'error';
        loaded++;
      } catch (e) {
        entry.status = 'error';
        console.error(e);
      }
    }

    renderFileTags();
    setStatus(`Loaded ${loaded} of ${loadedFiles.length} files.`);

    const examIds = new Set();
    loadedFiles.forEach(f => {
      if (f.examData) Object.keys(f.examData).forEach(id => examIds.add(parseInt(id)));
    });

    if (!examIds.size) {
      setStatus('No exam data found in PDFs. Make sure reports were generated after taking exams.');
      return;
    }

    renderTabs([...examIds].sort((a, b) => a - b));
  }

  function renderTabs(examIds) {
    const tabsEl = document.getElementById('exam-tabs');
    tabsEl.innerHTML = '';
    examIds.forEach((id, i) => {
      const tab = document.createElement('button');
      tab.className = `exam-tab${i === 0 ? ' active' : ''}`;
      tab.textContent = `EXAM ${id}`;
      tab.onclick = () => {
        document.querySelectorAll('.exam-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        renderTable(id);
      };
      tabsEl.appendChild(tab);
    });
    renderTable(examIds[0]);
    document.getElementById('export-btn').style.display = 'inline-block';
  }

  function renderTable(examId) {
    currentExamId = examId;
    const resultsArea = document.getElementById('results-area');
    resultsArea.classList.remove('hidden');

    const students = loadedFiles.filter(f => f.examData && f.examData[examId]);

    if (!students.length) {
      resultsArea.innerHTML = `<div id="empty-state"><div class="big">📭</div><div>No students have taken Exam ${examId} yet.</div></div>`;
      return;
    }

    // Gather all question prompts ordered by q number
    const qMap = {};
    students.forEach(s => {
      (s.examData[examId].questions || []).forEach(q => {
        if (!qMap[q.q]) qMap[q.q] = q.prompt;
      });
    });
    const qNums = Object.keys(qMap).map(Number).sort((a, b) => a - b);

    // Build table
    let html = '<table>';

    // Header row
    html += '<tr><th class="question-label">QUESTION</th>';
    students.forEach(s => {
      html += `<th class="student-name">${s.studentName}</th>`;
    });
    html += '</tr>';

    // Score row
    html += '<tr class="score-row"><td class="question-label">SCORE</td>';
    students.forEach(s => {
      const ex = s.examData[examId];
      const score = ex.score !== null ? ex.score : '?';
      const total = ex.total !== null ? ex.total : '?';
      html += `<td style="text-align:center">${score}/${total}</td>`;
    });
    html += '</tr>';

    // Question rows
    qNums.forEach(qNum => {
      const prompt = stripHtml(qMap[qNum]);
      const shortPrompt = prompt.length > 50 ? prompt.slice(0, 47) + '...' : prompt;
      html += `<tr><td class="question-label" title="${prompt}">Q${qNum}: ${shortPrompt}</td>`;
      students.forEach(s => {
        const q = (s.examData[examId].questions || []).find(q => q.q === qNum);
        if (!q) {
          html += `<td class="no-data">—</td>`;
        } else if (q.correct) {
          html += `<td class="correct">✓</td>`;
        } else {
          html += `<td class="wrong">✗</td>`;
        }
      });
      html += '</tr>';
    });

    html += '</table>';

    // Summary stats
    const avgScore = students.reduce((sum, s) => {
      const ex = s.examData[examId];
      return sum + (ex.score !== null ? ex.score : 0);
    }, 0) / students.length;

    const total = students[0]?.examData[examId]?.total || 10;

    // Per-question pass rates
    const qStats = qNums.map(qNum => {
      const answers = students.map(s => (s.examData[examId].questions || []).find(q => q.q === qNum));
      const attempted = answers.filter(a => a).length;
      const correct = answers.filter(a => a && a.correct).length;
      return { qNum, prompt: qMap[qNum], pct: attempted ? Math.round((correct / attempted) * 100) : null };
    });

    const hardest = [...qStats].filter(q => q.pct !== null).sort((a, b) => a.pct - b.pct).slice(0, 3);

    html += `<div id="summary">
      <div class="summary-card"><div class="label">STUDENTS</div><div class="value">${students.length}</div></div>
      <div class="summary-card"><div class="label">CLASS AVG</div><div class="value">${avgScore.toFixed(1)}/${total}</div></div>
      <div class="summary-card"><div class="label">PASS RATE</div><div class="value">${Math.round((avgScore / total) * 100)}%</div></div>
    </div>`;

    if (hardest.length) {
      html += `<div class="hardest-q"><h3>⚠ HARDEST QUESTIONS</h3>`;
      hardest.forEach(q => {
        html += `<div class="hardest-q-item"><span class="pct">${q.pct}%</span><span class="qtext">Q${q.qNum}: ${stripHtml(q.prompt).slice(0, 80)}</span></div>`;
      });
      html += `</div>`;
    }

    resultsArea.innerHTML = html;
  }

  function stripHtml(html) {
    const d = document.createElement('div');
    d.innerHTML = html;
    return d.textContent || d.innerText || '';
  }

  async function exportToPDF() {
      const { PDFDocument } = PDFLib;
  
      const examId = currentExamId;
      const students = loadedFiles.filter(f => f.examData && f.examData[examId]);
      if (!students.length) return;
  
      const qMap = {};
      students.forEach(s => {
          (s.examData[examId].questions || []).forEach(q => {
              if (!qMap[q.q]) qMap[q.q] = q.prompt;
          });
      });
      const qNums = Object.keys(qMap).map(Number).sort((a, b) => a - b);
  
      // --- Layout ---
      const PADDING = 40;
      const ROW_H = 36;
      const COL_Q_WIDTH = 320;
      const COL_STUDENT_WIDTH = 110;
      const HEADER_H = 100;
      const TABLE_TOP = HEADER_H + 20;
      const TITLE_ROW_H = 44;
      const SCORE_ROW_H = 36;
      const SUMMARY_H = 100;
      const HARDEST_H = 30 + Math.min(3, qNums.length) * 28;
  
      const tableWidth = COL_Q_WIDTH + students.length * COL_STUDENT_WIDTH;
      const CANVAS_WIDTH = Math.max(tableWidth + PADDING * 2, 800);
      const tableRows = 1 + 1 + qNums.length; // header + score + questions
      const CANVAS_HEIGHT = TABLE_TOP + TITLE_ROW_H + SCORE_ROW_H + qNums.length * ROW_H + SUMMARY_H + HARDEST_H + PADDING * 2;
  
      const canvas = document.createElement('canvas');
      canvas.width = CANVAS_WIDTH;
      canvas.height = CANVAS_HEIGHT;
      const ctx = canvas.getContext('2d');
  
      // Background
      ctx.fillStyle = '#1e1e1e';
      ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
  
      // Border
      ctx.strokeStyle = '#569cd6';
      ctx.lineWidth = 6;
      ctx.strokeRect(3, 3, CANVAS_WIDTH - 6, CANVAS_HEIGHT - 6);
  
      // --- Header ---
      ctx.fillStyle = '#569cd6';
      ctx.font = 'bold 28px Consolas, monospace';
      ctx.textAlign = 'center';
      ctx.fillText(`PYTHON DEFENSE — CLASS REPORT`, CANVAS_WIDTH / 2, 44);
  
      ctx.fillStyle = '#dcdcaa';
      ctx.font = '18px Consolas, monospace';
      ctx.fillText(`EXAM ${examId}  •  ${students.length} Students`, CANVAS_WIDTH / 2, 74);
  
      // --- Table column headers ---
      let y = TABLE_TOP;
      ctx.fillStyle = '#2d2d2d';
      ctx.fillRect(PADDING, y, CANVAS_WIDTH - PADDING * 2, TITLE_ROW_H);
  
      ctx.fillStyle = '#569cd6';
      ctx.font = 'bold 14px Consolas, monospace';
      ctx.textAlign = 'left';
      ctx.fillText('QUESTION', PADDING + 10, y + 26);
  
      students.forEach((s, i) => {
          const x = PADDING + COL_Q_WIDTH + i * COL_STUDENT_WIDTH;
          ctx.fillStyle = '#dcdcaa';
          ctx.font = 'bold 12px Consolas, monospace';
          ctx.textAlign = 'center';
          const name = s.studentName.length > 10 ? s.studentName.slice(0, 9) + '…' : s.studentName;
          ctx.fillText(name, x + COL_STUDENT_WIDTH / 2, y + 26);
      });
  
      // --- Score row ---
      y += TITLE_ROW_H;
      ctx.fillStyle = '#252526';
      ctx.fillRect(PADDING, y, CANVAS_WIDTH - PADDING * 2, SCORE_ROW_H);
      ctx.strokeStyle = '#569cd6';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(PADDING, y);
      ctx.lineTo(CANVAS_WIDTH - PADDING, y);
      ctx.stroke();
  
      ctx.fillStyle = '#dcdcaa';
      ctx.font = 'bold 13px Consolas, monospace';
      ctx.textAlign = 'left';
      ctx.fillText('SCORE', PADDING + 10, y + 23);
  
      students.forEach((s, i) => {
          const ex = s.examData[examId];
          const score = ex.score !== null ? ex.score : '?';
          const total = ex.total !== null ? ex.total : '?';
          const x = PADDING + COL_Q_WIDTH + i * COL_STUDENT_WIDTH;
          ctx.fillStyle = '#dcdcaa';
          ctx.font = 'bold 13px Consolas, monospace';
          ctx.textAlign = 'center';
          ctx.fillText(`${score}/${total}`, x + COL_STUDENT_WIDTH / 2, y + 23);
      });
  
      // --- Question rows ---
      qNums.forEach((qNum, qi) => {
          y += (qi === 0 ? SCORE_ROW_H : ROW_H);
          const rowY = y;
  
          // Alternating background
          ctx.fillStyle = qi % 2 === 0 ? '#252526' : '#1e1e1e';
          ctx.fillRect(PADDING, rowY, CANVAS_WIDTH - PADDING * 2, ROW_H);
  
          // Row border
          ctx.strokeStyle = '#333';
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(PADDING, rowY + ROW_H);
          ctx.lineTo(CANVAS_WIDTH - PADDING, rowY + ROW_H);
          ctx.stroke();
  
          // Question label
          const prompt = stripHtml(qMap[qNum]);
          const short = prompt.length > 38 ? prompt.slice(0, 35) + '...' : prompt;
          ctx.fillStyle = '#888';
          ctx.font = '12px Consolas, monospace';
          ctx.textAlign = 'left';
          ctx.fillText(`Q${qNum}: ${short}`, PADDING + 10, rowY + 22);
  
          // Student cells
          students.forEach((s, i) => {
              const q = (s.examData[examId].questions || []).find(q => q.q === qNum);
              const x = PADDING + COL_Q_WIDTH + i * COL_STUDENT_WIDTH;
              if (!q) {
                  ctx.fillStyle = '#333';
                  ctx.fillRect(x, rowY, COL_STUDENT_WIDTH, ROW_H);
                  ctx.fillStyle = '#555';
                  ctx.font = 'bold 14px Consolas, monospace';
                  ctx.textAlign = 'center';
                  ctx.fillText('—', x + COL_STUDENT_WIDTH / 2, rowY + 22);
              } else if (q.correct) {
                  ctx.fillStyle = '#1a3a1a';
                  ctx.fillRect(x, rowY, COL_STUDENT_WIDTH, ROW_H);
                  ctx.fillStyle = '#6a9955';
                  ctx.font = 'bold 16px Consolas, monospace';
                  ctx.textAlign = 'center';
                  ctx.fillText('✓', x + COL_STUDENT_WIDTH / 2, rowY + 22);
              } else {
                  ctx.fillStyle = '#3a1a1a';
                  ctx.fillRect(x, rowY, COL_STUDENT_WIDTH, ROW_H);
                  ctx.fillStyle = '#f44747';
                  ctx.font = 'bold 16px Consolas, monospace';
                  ctx.textAlign = 'center';
                  ctx.fillText('✗', x + COL_STUDENT_WIDTH / 2, rowY + 22);
              }
  
              // Cell border
              ctx.strokeStyle = '#333';
              ctx.lineWidth = 1;
              ctx.strokeRect(x, rowY, COL_STUDENT_WIDTH, ROW_H);
          });
      });
  
      // --- Summary cards ---
      const summaryY = y + ROW_H + 30;
      const avgScore = students.reduce((sum, s) => {
          const ex = s.examData[examId];
          return sum + (ex.score !== null ? ex.score : 0);
      }, 0) / students.length;
      const total = students[0]?.examData[examId]?.total || 10;
      const passRate = Math.round((avgScore / total) * 100);
  
      const cards = [
          { label: 'STUDENTS', value: String(students.length) },
          { label: 'CLASS AVG', value: `${avgScore.toFixed(1)}/${total}` },
          { label: 'PASS RATE', value: `${passRate}%` }
      ];
  
      cards.forEach((card, i) => {
          const cx = PADDING + i * 200;
          ctx.fillStyle = '#2d2d2d';
          ctx.strokeStyle = '#444';
          ctx.lineWidth = 1;
          ctx.fillRect(cx, summaryY, 180, 60);
          ctx.strokeRect(cx, summaryY, 180, 60);
          ctx.fillStyle = '#888';
          ctx.font = '11px Consolas, monospace';
          ctx.textAlign = 'left';
          ctx.fillText(card.label, cx + 12, summaryY + 18);
          ctx.fillStyle = '#dcdcaa';
          ctx.font = 'bold 22px Consolas, monospace';
          ctx.fillText(card.value, cx + 12, summaryY + 48);
      });
  
      // --- Hardest questions ---
      const qStats = qNums.map(qNum => {
          const answers = students.map(s => (s.examData[examId].questions || []).find(q => q.q === qNum));
          const attempted = answers.filter(a => a).length;
          const correct = answers.filter(a => a && a.correct).length;
          return { qNum, prompt: qMap[qNum], pct: attempted ? Math.round((correct / attempted) * 100) : null };
      });
      const hardest = [...qStats].filter(q => q.pct !== null).sort((a, b) => a.pct - b.pct).slice(0, 3);
  
      if (hardest.length) {
          const hardestY = summaryY + 80;
          ctx.fillStyle = '#f44747';
          ctx.font = 'bold 13px Consolas, monospace';
          ctx.textAlign = 'left';
          ctx.fillText('⚠ HARDEST QUESTIONS', PADDING, hardestY);
  
          hardest.forEach((q, i) => {
              const hy = hardestY + 24 + i * 26;
              const prompt = stripHtml(q.prompt).slice(0, 70);
              ctx.fillStyle = '#f44747';
              ctx.font = 'bold 12px Consolas, monospace';
              ctx.fillText(`${q.pct}%`, PADDING, hy);
              ctx.fillStyle = '#d4d4d4';
              ctx.font = '12px Consolas, monospace';
              ctx.fillText(`Q${q.qNum}: ${prompt}`, PADDING + 50, hy);
          });
      }
  
      // --- Export to PDF ---
      const pdfDoc = await PDFDocument.create();
      const pngDataUrl = canvas.toDataURL('image/png');
      const pngBase64 = pngDataUrl.split(',')[1];
      const pngBytes = Uint8Array.from(atob(pngBase64), c => c.charCodeAt(0));
      const pngImage = await pdfDoc.embedPng(pngBytes);
  
      const page = pdfDoc.addPage([canvas.width, canvas.height]);
      page.drawImage(pngImage, { x: 0, y: 0, width: canvas.width, height: canvas.height });
  
      const pdfBytes = await pdfDoc.save();
      const blob = new Blob([pdfBytes], { type: 'application/pdf' });
      const link = document.createElement('a');
      link.download = `PythonDefense_ClassReport_Exam${examId}.pdf`;
      link.href = URL.createObjectURL(blob);
      link.click();
  }
</script>
</body>
